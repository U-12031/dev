<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">

	<!-- Google tag (gtag.js) -->

	<script>

		function gtag(){dataLayer.push(arguments);}
		gtag('js', new Date());

		gtag('config', 'G-G3VRHWGPB7');

	<!-- MathJax:
		I used MathJax(https://www.mathjax.org/).
		Thank you for MathJax.
	-->
	<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

	<title>Mathematical Clicker</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="pinnedValParent"></div>
	<h1 id="mainFormula" class="formula">
		\(s=\)
		<span id="t"><!-- t="time" -->
			\(\,t\)
			<span>\(t=50\)</span>
		</span>
		\(-\)
		<span id="s_u"><!-- s_u="score_used" 何かに支払ったスコアの数 -->
			\(s_u\)
			<span>\(s_u=1000\)</span>
		</span>
		\(-\)
		<span id="e_r"><!-- e="error" レベルを上げたことによって急に上がる誤差 -->
			\(e_r\)
			<span>\(e_r=0\)</span>
		</span>
	</h1>
	<div id="shop">
		<button id="mShop">
			<span class="left">
				<span class="title">Unlock<span class="formula">\(~~m\)</span>
				<br>
				<span class="level">0</span>
			</span>
			</span>
			<span class="right formula">
				<span class="cost">\(s_u ← + 0\)</span>
				<br>
				<span class="effect">\(e_r ← + 0\)</span>
			</span>
		</button>
	</div>

	<script src="script.js"></script>
</body>
</html>
