<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Test</title>
</head>
<body>
	<button onclick="start();">センサーからのデータの取得を開始</button>
	<br>Alpha: <span id="alpha"></span>
	<br>Beta: <span id="beta"></span>
	<br>Gamma: <span id="gamma"></span>
	<br>Altitude: <span id="altitude"></span>
	<br>Speed: <span id="speed"></span>
	<br>Heading: <span id="heading"></span>
	<br>error: <span id="error"></span>
<script>
	function el(id) {return document.getElementById(id)};

	try {
		let alpha, beta, gamma; // 角度
		let altitude, speed, heading; // GPS

		function start() {
			// iPhone用許可
			if (typeof DeviceOrientationEvent.requestPermission === "function") {
				DeviceOrientationEvent.requestPermission().then(response => {
					if (response === "granted") startSensors();
				});
			}else{
				startSensors();
			};
		};

		function startSensors(){
			// 角度
			window.addEventListener("deviceorientation",(event)=>{
				alpha = event.alpha;
				beta = event.beta;
				gamma = event.gamma;
				el("alpha").innerHTML = alpha + "deg";
				el("beta").innerHTML = beta + "deg";
				el("gamma").innerHTML = gamma + "deg";
			});

			// GPS
			navigator.geolocation.watchPosition((pos)=>{
				const coords = pos.coords;
				altitude = coords.altitude;
				speed = coords.speed;
				heading = coords.heading;
				el("altitude").innerHTML = altitude + "m";
				el("speed").innerHTML = speed + "m/s (" + (speed * 3.6) + "km/h)";
				el("heading").innerHTML = heading + "deg";
			}, null, {enableHighAccuracy: true});// 高精度な位置情報を取得する
		};
	} catch(error) { el("error").innerHTML = `${error.name}\n${error.stack}`;}
</script>
</body>
</html>
